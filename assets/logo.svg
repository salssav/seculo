<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" role="img" aria-label="Século Explorer">
  <!-- Compass rose mark -->
  <g transform="translate(20, 24)">
    <!-- Diagonal cross lines -->
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Cardinal cross lines -->
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Centre circle -->
    <circle cx="0" cy="0" r="2.5" fill="#C8A96E"/>
    <!-- North tip accent -->
    <polygon points="0,-13 -3,-6 3,-6" fill="#C8A96E" opacity="0.7"/>
  </g>

  <!-- SÉCULO text -->
  <text x="44" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#1A1A2E" letter-spacing="2">SÉCULO</text>

  <!-- EXPLORER text -->
  <text x="45" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" fill="#C8A96E" letter-spacing="3.5">EXPLORER</text>
</svg>
